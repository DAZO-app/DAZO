networks:
  app-network:
    driver: bridge

services:
  # Application principale (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dazo-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - app-network
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Serveur Web (Nginx)
  web:
    image: nginx:alpine
    container_name: dazo-nginx
    restart: unless-stopped
    ports:
      - "3003:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

  # Travailleur de file d'attente (Queue Worker)
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dazo-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./:/var/www/html
    networks:
      - app-network
    depends_on:
      - app

  # Planificateur (Scheduler)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dazo-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    networks:
      - app-network
    depends_on:
      - app

  # WebSocket (Reverb)
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dazo-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8081:8080"
    networks:
      - app-network
    depends_on:
      - app

  # Base de données (PostgreSQL)
  pgsql:
    image: postgres:15
    container_name: dazo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-dazo}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - dazo-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-dazo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache & Sessions (Redis)
  redis:
    image: redis:alpine
    container_name: dazo-redis
    restart: unless-stopped
    volumes:
      - dazo-redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Mail Testing (Mailpit)
  mailpit:
    image: axllent/mailpit:latest
    container_name: dazo-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network

volumes:
  dazo-db-data:
  dazo-redis-data:
